<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Staff Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #e6e8ec;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .login-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--secondary-color), var(--success-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .role-btn:hover {
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .role-btn.active {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary-color), var(--success-color));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger-color);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-parking"></i> Smart Parking</h1>
            <p>Staff Access Portal</p>
        </div>

        <div class="alert alert-error" id="errorAlert">
            <i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span>
        </div>

        <div class="alert alert-success" id="successAlert">
            <i class="fas fa-check-circle"></i> <span id="successMessage"></span>
        </div>

        <form id="loginForm">
            <div class="role-selector">
                <button type="button" class="role-btn active" data-role="exit">
                    <i class="fas fa-sign-out-alt"></i> Exit Staff
                </button>
                <button type="button" class="role-btn" data-role="admin">
                    <i class="fas fa-user-shield"></i> Admin
                </button>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>

    <script>
        class AuthSystem {
            constructor() {
                this.selectedRole = 'exit';
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.checkExistingAuth();
            }

            setupEventListeners() {
                // Role selector
                document.querySelectorAll('.role-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.selectedRole = e.target.dataset.role;
                        console.log('Role selected:', this.selectedRole); // Debug log
                        
                        // Check for existing auth session when role changes
                        this.checkExistingAuth();
                    });
                });

                // Login form
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });
            }

            checkExistingAuth() {
                try {
                    // Check for any existing auth session
                    const exitAuth = localStorage.getItem('parkingAuth_exit');
                    const adminAuth = localStorage.getItem('parkingAuth_admin');
                    
                    // Debug logging
                    console.log('Auth check - Exit auth:', exitAuth);
                    console.log('Auth check - Admin auth:', adminAuth);
                    console.log('Auth check - Selected role:', this.selectedRole);
                    
                    // Only redirect if there's an active session and we're not coming from logout
                    // Check if we're coming from a logout (look for URL parameter or check if we just cleared a session)
                    const urlParams = new URLSearchParams(window.location.search);
                    const isFromLogout = urlParams.get('logout') === 'true' || 
                                       (urlParams.get('cleared') === 'true');
                    
                    console.log('Auth check - Is from logout:', isFromLogout);
                    console.log('Auth check - URL params:', Object.fromEntries(urlParams));
                    
                    if (!isFromLogout) {
                        const currentRoleAuth = this.selectedRole === 'exit' ? exitAuth : adminAuth;
                        
                        if (currentRoleAuth) {
                            const auth = JSON.parse(currentRoleAuth);
                            if (auth.expiresAt > Date.now()) {
                                console.log('Auth check - Redirecting to terminal:', this.selectedRole);
                                this.redirectToTerminal(this.selectedRole);
                            } else {
                                // Clean up expired session
                                localStorage.removeItem(`parkingAuth_${this.selectedRole}`);
                            }
                        }
                    } else {
                        // Clear URL parameters after processing logout to prevent issues
                        if (urlParams.get('logout') || urlParams.get('cleared')) {
                            console.log('Auth check - Clearing URL params');
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                } catch (error) {
                    console.warn('Auth check failed:', error);
                    localStorage.removeItem(`parkingAuth_${this.selectedRole}`);
                }
            }

            handleLogin() {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');

                console.log('Login attempt with role:', this.selectedRole); // Debug log

                // Basic validation
                if (!username || !password) {
                    this.showError('Please enter both username and password.');
                    return;
                }

                // Show loading state
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

                // Simulate authentication delay
                setTimeout(() => {
                    const isValid = this.validateCredentials(username, password, this.selectedRole);
                    
                    if (isValid) {
                        this.createAuthSession(username, this.selectedRole);
                    } else {
                        this.showError('Invalid credentials. Please try again.');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    }
                }, 500);
            }

            validateCredentials(username, password, role) {
                // In production, this should be server-side validation
                // For demo purposes, allowing basic validation
                // TODO: Implement proper server-side authentication
                
                // Basic validation - in production, validate against database
                const isValid = username && password && username.length >= 3 && password.length >= 3;
                
                return isValid;
            }

            createAuthSession(username, role) {
                try {
                    const authData = {
                        username: username,
                        role: role,
                        loginTime: Date.now(),
                        expiresAt: Date.now() + (8 * 60 * 60 * 1000) // 8 hours
                    };

                    // Store role-specific session
                    localStorage.setItem(`parkingAuth_${role}`, JSON.stringify(authData));
                    
                    this.showSuccess('Login successful! Redirecting...');
                    
                    setTimeout(() => {
                        this.redirectToTerminal(role);
                    }, 1500);
                } catch (error) {
                    console.error('Failed to create auth session:', error);
                    this.showError('Login failed. Please try again.');
                    const loginBtn = document.getElementById('loginBtn');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }

            redirectToTerminal(role) {
                console.log('Redirecting to terminal for role:', role); // Debug log
                
                const terminals = {
                    exit: 'professional-exit-terminal.html',
                    admin: 'professional-dashboard.html'
                };

                const targetUrl = terminals[role];
                console.log('Target URL:', targetUrl); // Debug log
                
                if (targetUrl) {
                    window.location.href = targetUrl;
                } else {
                    console.error('Invalid role:', role); // Debug log
                    this.showError('Invalid role selected. Please try again.');
                    const loginBtn = document.getElementById('loginBtn');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }

            showError(message) {
                const errorAlert = document.getElementById('errorAlert');
                const successAlert = document.getElementById('successAlert');
                
                document.getElementById('errorMessage').textContent = message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';
                
                setTimeout(() => {
                    errorAlert.style.display = 'none';
                }, 5000);
            }

            showSuccess(message) {
                const errorAlert = document.getElementById('errorAlert');
                const successAlert = document.getElementById('successAlert');
                
                document.getElementById('successMessage').textContent = message;
                successAlert.style.display = 'block';
                errorAlert.style.display = 'none';
                
                setTimeout(() => {
                    successAlert.style.display = 'none';
                }, 3000);
            }
        }

        // Initialize auth system
        const authSystem = new AuthSystem();
    </script>
</body>
</html>
