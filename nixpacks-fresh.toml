[phases.setup]
nixPkgs = ["jdk21", "maven"]

[phases.build]
cmds = ["mvn clean package -DskipTests -q"]

[start]
cmd = "java $JAVA_OPTS -jar target/*.jar"

[healthcheck]
path = "/actuator/health"
timeout = 180
gracePeriod = 90

[variables]
JAVA_OPTS = "-Xmx768m -Xms384m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=70.0"
