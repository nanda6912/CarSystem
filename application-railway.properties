# Fresh Railway Backend Configuration
spring.profiles.active=railway

# Database Configuration
spring.datasource.url=${RAILWAY_DATABASE_URL}
spring.datasource.username=${RAILWAY_DATABASE_USERNAME}
spring.datasource.password=${RAILWAY_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (Conservative for Stability)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.leak-detection-threshold=10000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server Configuration
server.port=${PORT:8085}
server.servlet.context-path=/

# CORS Configuration
spring.web.cors.allowed-origins=${VERCEL_URL:https://smart-parkin-system.vercel.app}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging (Minimal)
logging.level.root=ERROR
logging.level.com.parking=WARN
logging.pattern.console=%d{HH:mm:ss} %msg%n

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Performance
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=2
