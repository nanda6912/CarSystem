[phases.setup]
nixPkgs = ["jdk21", "maven"]

[phases.build]
cmds = ["mvn clean package -DskipTests -q"]

[start]
cmd = "java -jar target/*.jar"

[healthcheck]
path = "/actuator/health"
timeout = 300
gracePeriod = 60

[variables]
JAVA_OPTS = "-Xmx1024m -Xms512m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
