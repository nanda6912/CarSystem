# =============================================================================
# Smart Parking Management System - Production Configuration
# =============================================================================
# Version: 7.0.0
# Profile: Production
# =============================================================================

# Server Configuration
server.port=${PORT:8085}
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# =============================================================================
# Database Configuration - Production PostgreSQL (Railway)
# =============================================================================
spring.datasource.url=${RAILWAY_DATABASE_URL:jdbc:postgresql://localhost:5432/smart_parking_db}
spring.datasource.username=${RAILWAY_DATABASE_USERNAME:parking_user}
spring.datasource.password=${RAILWAY_DATABASE_PASSWORD:parking123}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# Connection Pool Configuration - Production (Railway Optimized)
# =============================================================================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=30000

# =============================================================================
# JPA Configuration - Production
# =============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.defer-datasource-initialization=false
spring.jpa.open-in-view=false

# =============================================================================
# Application Configuration
# =============================================================================
spring.application.name=Smart Parking System
spring.profiles.active=prod

# =============================================================================
# CORS Configuration - Production
# =============================================================================
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:8081},https://localhost:8081
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# =============================================================================
# File Upload Configuration
# =============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================================================
# Caching Configuration - Production
# =============================================================================
spring.cache.type=simple
spring.cache.cache-names=slots,bookings,stats

# =============================================================================
# Actuator Configuration - Production
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.info.env.enabled=false

# =============================================================================
# Logging Configuration - Production (Container Optimized)
# =============================================================================
logging.level.com.parking=WARN
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.springframework.security=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# Disable file logging in container environment
logging.file.name=
logging.logback.rollingpolicy.enabled=false

# =============================================================================
# OpenAPI Documentation - Production
# =============================================================================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# =============================================================================
# Application Specific Settings - Production
# =============================================================================
parking.slots.capacity=200
parking.slots.blocks-per-floor=5
parking.slots.slots-per-block=20
parking.billing.base-rate=20
parking.billing.currency=INR

# =============================================================================
# Security Configuration - Production
# =============================================================================
security.jwt.secret=${JWT_SECRET:smart-parking-production-secret-key-2024}
security.jwt.expiration=86400000
security.cors.allowed-origins=${spring.web.cors.allowed-origins}

# =============================================================================
# Performance Configuration
# =============================================================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=100

# =============================================================================
# Environment Variables Override
# =============================================================================
# DATABASE_URL - PostgreSQL connection URL
# DATABASE_USERNAME - Database username
# DATABASE_PASSWORD - Database password
# FRONTEND_URL - Frontend application URL(s)
# JWT_SECRET - JWT secret key
# PORT - Server port (default: 8085)
