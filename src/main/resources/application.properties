# =============================================================================
# Smart Parking Management System - Application Configuration
# =============================================================================
# Version: 7.0.0
# Profile: Development (Default)
# =============================================================================

# Server Configuration
server.port=8085
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# =============================================================================
# Database Configuration - PostgreSQL 18.2
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_parking_db
spring.datasource.username=postgres
spring.datasource.password=Nanda@123
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# Connection Pool Configuration (HikariCP)
# =============================================================================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# =============================================================================
# JPA Configuration - PostgreSQL
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# =============================================================================
# Database Initialization
# =============================================================================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema.sql

# =============================================================================
# Application Configuration
# =============================================================================
spring.application.name=Smart Parking System
spring.profiles.active=dev

# =============================================================================
# CORS Configuration
# =============================================================================
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:8081,http://localhost:8085
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# =============================================================================
# File Upload Configuration
# =============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================================================
# Caching Configuration
# =============================================================================
spring.cache.type=simple
spring.cache.cache-names=slots,bookings,stats

# =============================================================================
# Actuator Configuration
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# =============================================================================
# Logging Configuration
# =============================================================================
logging.level.com.parking=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# OpenAPI Documentation
# =============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================================================
# Application Specific Settings
# =============================================================================
parking.slots.capacity=200
parking.slots.blocks-per-floor=5
parking.slots.slots-per-block=20
parking.billing.base-rate=20
parking.billing.currency=INR

# =============================================================================
# Security Configuration
# =============================================================================
security.jwt.secret=smart-parking-secret-key-2024
security.jwt.expiration=86400000
security.cors.allowed-origins=${spring.web.cors.allowed-origins}
