# Server Configuration
server.port=8085

# Database Configuration - PostgreSQL 18.2 (Now Active)
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_parking_db
spring.datasource.username=postgres
spring.datasource.password=Nanda@123
spring.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# H2 Console (Disabled)
spring.h2.console.enabled=false
# spring.h2.console.path=/h2-console

# JPA Configuration - PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.defer-datasource-initialization=true

# PostgreSQL Initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Application Configuration
spring.application.name=Smart Parking System

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:8081,http://localhost:8085
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
