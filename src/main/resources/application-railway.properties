# Railway Production Configuration
spring.profiles.active=railway

# Database Configuration (Railway PostgreSQL)
spring.datasource.url=${RAILWAY_DATABASE_URL}
spring.datasource.username=${RAILWAY_DATABASE_USERNAME}
spring.datasource.password=${RAILWAY_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Server Configuration
server.port=${PORT:8085}
server.servlet.context-path=/

# CORS Configuration (Allow Vercel Frontend)
spring.web.cors.allowed-origins=${VERCEL_URL:https://your-app.vercel.app},https://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging Configuration
logging.level.com.parking=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Railway Specific
railway.env=production
