# Render Production Configuration
spring.profiles.active=render

# Database Configuration (Render PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (Render Optimized)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server Configuration
server.port=${PORT:10000}
server.servlet.context-path=/

# CORS Configuration
spring.web.cors.allowed-origins=${VERCEL_URL:https://smart-parkin-system.vercel.app}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging Configuration
logging.level.com.parking=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=ERROR
logging.pattern.console=%d{HH:mm:ss} %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Performance Configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
