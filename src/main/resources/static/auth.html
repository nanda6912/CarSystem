<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Staff Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #e6e8ec;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .login-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--secondary-color), var(--success-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .role-btn:hover {
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .role-btn.active {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary-color), var(--success-color));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger-color);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-parking"></i> Smart Parking</h1>
            <p>Staff Access Portal</p>
        </div>

        <div class="alert alert-error" id="errorAlert">
            <i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span>
        </div>

        <div class="alert alert-success" id="successAlert">
            <i class="fas fa-check-circle"></i> <span id="successMessage"></span>
        </div>

        <form id="loginForm">
            <div class="role-selector">
                <button type="button" class="role-btn active" data-role="exit">
                    <i class="fas fa-sign-out-alt"></i> Exit Staff
                </button>
                <button type="button" class="role-btn" data-role="admin">
                    <i class="fas fa-user-shield"></i> Admin
                </button>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>

    <script>
        class AuthSystem {
            constructor() {
                this.currentUser = null;
                this.currentRole = null;
                this.init();
            }

            init() {
                console.log('Auth system initializing...'); // Debug log
                
                // Check if this is a logout redirect
                const urlParams = new URLSearchParams(window.location.search);
                const isLogout = urlParams.get('logout') === 'true';
                
                console.log('URL params:', { isLogout }); // Debug log
                
                if (isLogout) {
                    // Show logout success message
                    this.showSuccess('You have been logged out successfully.');
                    // Clean the URL without page reload
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                
                this.setupEventListeners();
                this.setupRoleSelection();
            }

            async handleLogin() {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const role = this.currentRole;

                console.log('Login attempt:', { username, role }); // Debug log

                // Validate inputs
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                
                if (!this.validateInput(usernameInput) || !this.validateInput(passwordInput)) {
                    return;
                }

                // Check for duplicate login (same role already active)
                const existingAuth = localStorage.getItem(`parkingAuth_${role}`);
                if (existingAuth) {
                    try {
                        const auth = JSON.parse(existingAuth);
                        if (auth.expiresAt > Date.now()) {
                            this.showError(`This ${role} terminal is already open in another tab. Please close the other tab first.`);
                            return;
                        } else {
                            // Expired session, remove it
                            localStorage.removeItem(`parkingAuth_${role}`);
                        }
                    } catch (e) {
                        // Invalid data, remove it
                        localStorage.removeItem(`parkingAuth_${role}`);
                    }
                }

                // Disable login button
                const loginBtn = document.getElementById('loginBtn');
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

                try {
                    // Simulate authentication delay
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    // Validate credentials based on role
                    const isValid = this.validateCredentials(username, password, role);
                    
                    if (!isValid) {
                        throw new Error('Invalid credentials');
                    }

                    // Create session data with tab ID
                    const tabId = this.generateTabId();
                    const authData = {
                        username: username,
                        role: role,
                        loginTime: Date.now(),
                        expiresAt: Date.now() + (24 * 60 * 60 * 1000), // 24 hours
                        sessionId: this.generateSessionId(),
                        tabId: tabId
                    };

                    // Store role-specific session
                    localStorage.setItem(`parkingAuth_${role}`, JSON.stringify(authData));
                    
                    // Store active tab reference
                    localStorage.setItem(`activeTab_${role}`, tabId);
                    
                    this.showSuccess('Login successful! Redirecting...');
                    
                    setTimeout(() => {
                        this.redirectToTerminal(role);
                    }, 1500);
                } catch (error) {
                    console.error('Failed to create auth session:', error);
                    this.showError('Login failed. Please try again.');
                    const loginBtn = document.getElementById('loginBtn');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }

            generateTabId() {
                return 'tab_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            }

            setupEventListeners() {
                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.handleLogin();
                    });
                }

                // Add input validation
                const inputs = document.querySelectorAll('input[required]');
                inputs.forEach(input => {
                    input.addEventListener('blur', () => this.validateInput(input));
                    input.addEventListener('input', () => this.clearInputError(input));
                });
            }

            setupRoleSelection() {
                const roleButtons = document.querySelectorAll('.role-btn');
                roleButtons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        // Remove active class from all buttons
                        roleButtons.forEach(b => b.classList.remove('active'));
                        // Add active class to clicked button
                        btn.classList.add('active');
                        
                        // Store selected role
                        this.currentRole = btn.dataset.role;
                        console.log('Selected role:', this.currentRole); // Debug log
                    });
                });

                // Set default role
                const defaultBtn = document.querySelector('.role-btn[data-role="exit"]');
                if (defaultBtn) {
                    defaultBtn.classList.add('active');
                    this.currentRole = 'exit';
                }
            }

            validateInput(input) {
                const value = input.value.trim();
                let isValid = true;
                let errorMessage = '';

                if (input.id === 'username') {
                    if (!value) {
                        errorMessage = 'Username is required';
                        isValid = false;
                    } else if (value.length < 3) {
                        errorMessage = 'Username must be at least 3 characters';
                        isValid = false;
                    }
                } else if (input.id === 'password') {
                    if (!value) {
                        errorMessage = 'Password is required';
                        isValid = false;
                    } else if (value.length < 4) {
                        errorMessage = 'Password must be at least 4 characters';
                        isValid = false;
                    }
                }

                if (!isValid) {
                    this.showInputError(input, errorMessage);
                }

                return isValid;
            }

            showInputError(input, message) {
                input.classList.add('error');
                
                // Find or create error element
                let errorElement = input.parentNode.querySelector('.input-error');
                if (!errorElement) {
                    errorElement = document.createElement('div');
                    errorElement.className = 'input-error';
                    input.parentNode.appendChild(errorElement);
                }
                
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }

            clearInputError(input) {
                input.classList.remove('error');
                const errorElement = input.parentNode.querySelector('.input-error');
                if (errorElement) {
                    errorElement.style.display = 'none';
                }
            }

            validateCredentials(username, password, role) {
                const credentials = {
                    exit: {
                        'exit': 'exit123',
                        'operator': 'operator123',
                        'staff': 'staff123'
                    },
                    admin: {
                        'admin': 'admin123',
                        'manager': 'manager123',
                        'supervisor': 'supervisor123'
                    }
                };

                const roleCredentials = credentials[role];
                return roleCredentials && roleCredentials[username] === password;
            }

            generateSessionId() {
                return 'session_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            }

            redirectToTerminal(role) {
                console.log('Redirecting to terminal for role:', role); // Debug log
                
                const terminals = {
                    exit: 'professional-exit-terminal.html',
                    admin: 'professional-dashboard.html'
                };

                const targetUrl = terminals[role];
                console.log('Target URL:', targetUrl); // Debug log
                
                if (targetUrl) {
                    window.location.href = targetUrl;
                } else {
                    console.error('Invalid role:', role); // Debug log
                    this.showError('Invalid role selected. Please try again.');
                    const loginBtn = document.getElementById('loginBtn');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }

            showError(message) {
                const errorAlert = document.getElementById('errorAlert');
                const successAlert = document.getElementById('successAlert');
                
                document.getElementById('errorMessage').textContent = message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';
                
                setTimeout(() => {
                    errorAlert.style.display = 'none';
                }, 5000);
            }

            showSuccess(message) {
                const errorAlert = document.getElementById('errorAlert');
                const successAlert = document.getElementById('successAlert');
                
                document.getElementById('successMessage').textContent = message;
                successAlert.style.display = 'block';
                errorAlert.style.display = 'none';
                
                setTimeout(() => {
                    successAlert.style.display = 'none';
                }, 5000);
            }
        }

        // Initialize auth system when DOM is loaded
        let authSystem;
        document.addEventListener('DOMContentLoaded', () => {
            authSystem = new AuthSystem();
        });
    </script>
</body>
</html>
